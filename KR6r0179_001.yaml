body:
  text: 五祖大師慧能嚴父本貫范陽左降流于嶺南作新州百姓此身不幸父又早亡老母孤遺移來南海艱辛貧乏於市賣柴時有一客買柴使令送至客店客收去慧能得錢却出門外見一客誦經慧能一聞經語心即開悟遂問客誦何經客曰金剛經復問從何所來持此經典客云我從蘄州黃梅縣東禪寺來其寺是五祖忍大師在彼主化門人一千有餘我到彼中禮拜聽受此經大師常勸僧俗但持金剛經即自見性直了成佛六祖大師次日祖潛至碓坊見能腰石舂米語曰求道之人為法忘軀當如是乎乃問曰米熟也未慧能曰米熟久矣猶缺篩在祖以杖擊碓三下而去慧能即會祖意三鼓入室祖以袈裟遮圍不令人見為說金剛經至應無所住而生其心慧能言下大悟一切萬法不離自性遂啓祖言何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無動搖何期自性能生萬法祖知悟本性謂慧能曰不識本心學法無益若識自本心見自本性即名丈夫天人師佛并出法寶壇經明教大師嵩明教初自洞山游康山託迹開先法席主者以其佳少年鋭於文學命掌書記明教笑曰我豈為汝一杯薑杏湯耶因去之居杭之西湖三十年閉關不妄交嘉祐中以所撰輔教編定祖圖正宗記詣闕上之翰林王公素時權開封為表薦於朝仁宗皇帝加嘆久之下其書於中書宰相韓公參政歐公閲其文大驚譽於朝士大夫書竟賜入藏明教名遂聞天下晚移居靈隱之北永安蘭若清旦誦金剛般若經不輟音齊罷讀書賓客至則清談不及世事嘗曰客去清談少年高白髮饒夜分誦觀世音名號滿十萬聲則就寢其苦硬清約之風足以追配鍾山僧遠豫嘗見其手書與月禪師曰數年來欲製紙被一翻以禦苦寒今幸已成之想聞之大笑也臨終安坐微笑索筆作偈曰後夜月初明豫將獨自行不學大梅老猶貪鼯鼠聲既化火浴之頂骨眼睛齒舌耳毫男根數珠皆不壞如世尊言比丘生身不壞發無垢智光者善根功德之力如來知見之力故行住坐臥須內外清淨師得法於洞山聰禪師而宗派圖系於德山遠公法嗣之列誤矣洪覺範林間録中峯和尚中峯和尚杭州人既投師祝髮受具決志參究不到古人堂奧不已時高峯和尚負仰山雪嚴左券居天目師子岩立死關誓不接衲一見師大喜授以話頭師勵精咨決因誦金剛經至荷擔如來阿耨多羅三藐三菩提處恍然徹悟自是惠辨無礙上至君王宰輔下至三教俊英莫不傾誠問道所著書及語録若干卷弟子則天如遍集奏入大藏追贈普應國師之號師形模魁碩稍俯首則氣喘常平目安坐凡請求法語以兩頭陀扛紙信筆書之出山庵雜録瑞雪崖瑞雪崖者黃巖人也幼得度于秋江湛公居新城山留慶院持律嚴謹日課金剛般若經尤善瑜珈法事赴道俗請必盡恭恪而施利則不較厚薄或絶無亦不經意逮其再請赴之如初洪武辛亥夏五月得微索湯沐浴更衣書偈趺坐而逝闍維火星雜毫光迸散絶無煙𦦨獲堅固子甚多壽八十三出山庵雜録一溪徑山耆舊諱清泚號一溪壯年不守戒律飲啖無所擇至中年自念人生於世壽命能幾何一旦無常殺鬼到將何排遣遂盡斂所積衣資就普慶寺東建觀音堂一所修白淨業祈生淨土越數載手書金剛般若經至三千大千世界處握筆正身安坐而化至正丁酉猫獠燒劫普慶及居民房室獨觀音堂巋然獨存佛說善惡報應如影響渠不信夫出山庵雜録田子中洪武庚戌冬奉化田子中訪余太白同居者久余偶言金剛般若經閻羅王界稱為功德經故世人薦亡者多讀之子中誓終身受持一日值其母諱日發心誦此經百過以薦晨起坐松榻上方誦至九遍見鬼卒枷杻一老媼跪榻前髮離披覆面熟視之乃亡母也子中倉卒不知所為須臾引去若將脫枷者於是子中大泣恨不即時輟經與母相勞問余謂此經功德之大不可云喻若子中發心持誦即冥感陰界俾母子兩得相見以釋其苦嗚呼偉哉出山庵雜録亭湖神晉楊州江畔有亭湖神嚴峻甚惡于時有一客僧婆羅門名曰法藏善能持呪辟諸邪毒竝皆有驗別有小僧就藏學呪經於數年學業成就亦能降伏諸邪毒惡故詣亭湖神廟止宿誦呪伏神其夜見神遂致殞命藏師聞弟子誦呪致死懷忿自來夜到神廟瞋意誦呪神來出見自亦致死同寺有僧每恆受持般若聞師徒並亡遂來神所於廟夜誦金剛般若至夜半中聞有風聲極大迅速之間見有一物其形偉大壅聳驚人奇特可畏口齒長利眼光如電種種神變不可具述經師端坐正念誦經剎那匪懈情無怯怕都不憂懼神見形泰攝諸威勢來至師前右膝著地合掌恭敬聽經訖師問神曰檀越是何神靈初來猛峻後乃容豫神答云弟子惡業報得如是是此湖神然甚信敬經師又問若神信敬何意前二師竝皆打死答云前二師死者為不能受持大乘經典瞋心誦呪見弟子來逆前放罵專誦惡語欲降弟子弟子不伏于時二僧見弟子形惡自然怖死亦非弟子故殺二僧在近道俗見前二僧被殺謂經師亦死相率往看且見平安容儀歡泰時人甚怪競共問由具答前意實因般若威力聖教不虗諸人因此發心受持般若者衆出侯君素集蕭瑀蕭瑀梁武帝玄孫梁王巋之子梁滅入隋仕至中書令封安國公女煬帝皇后篤信佛法常持金剛經議伐高麗不合旨上大怒與賀若弼高𩓪同禁欲置於法瑀就其所八日念金剛經七百遍明日桎梏忽自脫守者失色復為著至殿前獨宥瑀二人即重罰因著般若經靈驗一十八條乃造寶塔貯經檀香為之高三尺感一鍮石像忽在庭中奉安塔中獲舍利百粒貞觀十一年見普賢菩薩冉冉向西而去出報應記趙文若隋大業中雍州長安縣人趙文若死經七日家人大殮將欲入棺乃縮一腳家人懼怕不敢入棺文若得活眷屬喜問所由文若云初有人引至王所王問汝生存之時作何福業文若答王受持金剛般若經王歎云善哉此福第一汝雖福善且將示汝其受罪之處令一人引文若北行十步至一牆孔令文若入隔牆有人引手從孔中捉文若頭引出極大辛苦得度牆外見大地獄鑊湯苦具罪人受苦不可具述乃有衆多猪羊雞鴨之屬競來從文若債命文若云吾不食汝身何故見逼諸畜生云汝往時某處食我頭腳四肢節節分張人各飲噉何諱之文若一心念佛深悔諸罪不出餘言求為修福報謝諸畜各散使人將文若却至王所王付一碗釘令文若食之并用五釘釘文若頭頂及手足然後放回文若得蘇具說此事然患頭痛及手足久後修福痛漸得差後爾已來精勤誦持金剛般若不敢遺漏寸陰但見道俗親疏並勸受持後因使至一驛廳上暫時偃息於時夢見一青衣婦女急來乞命文若驚寤即喚驛長問曰汝為吾欲殺生不驛長答云實為公欲殺一小羊文若問云其羊作何色答云是青牸羊文若報云汝急放却吾與價值贖取放之良由般若威力冥資感應也出冥祥記趙文昌隋開皇十一年太府寺丞趙文昌忽暴卒唯心上微暖家人不敢斂後復活說云吾初死有人引至閻羅王所王問曰汝一生已來作何福業昌答云家貧無力可營功德唯專心持誦金剛般若經王聞語合掌低首讚言善哉汝既持般若功德甚大王即使人引文昌向經藏內取金剛般若經文昌向西行五六里見數十間屋甚華麗其中經典遍滿金軸寶帙莊飾精好文昌合掌閉目信手抽取一卷開看乃是金剛般若文昌捧至王所令一人執卷在西文昌東立面經讀誦一字不遺王大歡喜即放昌還家令引文昌從南門出至門首見周武帝在門側房內著三重鉗鎖喚昌云汝是我本國人暫來至此要與汝語文昌即拜之帝曰汝識我否文昌答云臣昔宿衛陛下武帝云卿既是我舊臣今還家為吾向隋皇帝說吾諸罪並欲辨了唯滅佛法罪重未可得免望與吾營少功德冀茲福祐得離地獄昌受辭而行及出南門見一大糞坑中有人頭髮上出昌問之引人答云此是秦將白起寄禁於此罪尤未了昌至家得活遂以其事上奏帝令天下出口錢為周武帝轉金剛般若經設大供三日仍録事將入於隋史出太平廣記張政張政卭州人唐開成三年七月十五日暴亡初見四人來捉行半日至大江甚濶度深三尺許細看盡是膿血便小聲念金剛經使者色變入城見胡僧長八尺餘罵使者曰何不依帖亂捉平人盡皆驚拜及領見王僧與對坐曰張政是某本宗弟子被妄領來王曰待略勘問生色怒王判放去見使者四人皆著大枷僧自領政出城不見所渡之水僧曰吾是汝所宗和尚汝識我否我是須菩提乃知是持經之力再三拜禮僧曰弟子合眼僧以杖一擊不覺失聲乃活死已三百唯心上暖出報應記蒯武安隋蒯武安蔡州人有巨力善弓矢常射大蟲會嵩山南為暴甚往射之漸至深山忽有異物如野人手開大蟲皮武安身上因推落㵎下及起已為大蟲矣惶怖震駭莫知所為忽聞鐘聲知是僧居往求救果見一僧念金剛經即閉目俯伏其僧以手摩頭忽𪹼作巨聲頭已破矣武安乃從中出即具述前事又撫其背隨手而開既出全身衣服盡在有少大蟲毛蓋先灸瘡之所粘也從此遂出家專持金剛經出報應記陳惠妻唐陳惠妻王氏初未嫁表兄褚敬欲婚王氏父母不許敬詛曰若不嫁我我作鬼必相致後歸於惠惠為陵州仁壽尉敬陰恚之卒後王夢敬旋覺有娠經十七月不産王氏憂懼乃發心持金剛經晝夜不歇敬永絶交鬼胎亦銷從此日持七遍出報應記杜之亮隋杜之亮仁壽中為漢王諒府參軍後諒於并州舉兵反敗亮與僚屬皆繫獄亮惶懼日夜涕泣忽夜夢一僧曰汝但念誦金剛經即此厄可度至曉即取經專誠習念及主者並引就戮亮身在其中唱者皆死唯無亮姓名主典之者皆坐罰俄而會赦得免顯慶中卒於黃州刺史出報應記慕容文䇿慕容文䇿隋人常持金剛經不喫酒肉大業七年暴卒三日復活云初見二鬼把文牒追至一城門顧極巖峻入行四五里見有宮殿羽衛王當殿坐僧道四夷不可勝數使者入見文䇿最在後一一問在生作善作惡東西令立乃唱䇿名問曰作何善對曰小來持金剛經王聞合掌歎曰功德甚大且放還忽見二僧執火引䇿即捉袈裟角問之僧云緣公持經故來相衛可隨燭行遂出城門僧曰汝知地獄處否指一大城門曰此是也䇿不忍看求速去二僧即領至道有一橫垣塞路僧以錫扣之即開云可從此去遂活出報應記王殷蜀在營卒王殷常讀金剛經不茹葷飲酒為賞設庫子前後為人誤纍合死者數四皆非意得免至唐大和四年郭釗鎮蜀郭性嚴急小不如意皆死王殷因呈錦纈郭嫌其惡弱令袒背將斃之郭有蕃狗隨郭臥起非使宅人逢之輒噬忽吠聲立抱王殷之背驅逐不去郭異之怒遂解出酉陽雜爼王翰唐大和五年漢州什方縣百姓王翰常在市日逐小利忽暴卒經三日却活云冥中有十六人同被追十五人散配他處翰獨至一司見一青衫少年稱是己姪為冥官廳子遂引見推典又云是己兄貌皆不類其兄語云有冤牛一頭訴爾燒畬枉燒殺之又曾賣竹與殺狗人作箜篌殺狗二頭狗亦訴爾爾今名未注死籍猶可以免為作功德翰欲為設齊及寫法華經金光明經皆曰不可乃請曰持金剛經七遍與之其兄喜曰足矣及活遂捨業出家出酉陽雜爼張無是唐天寶十二載冬有司戈張無是居在布政坊因行街中夜鼓絶門閉遂趨橋下而跧夜半忽有數十騎至橋駐馬言使乙至布政坊將馬一乘往取十餘人其二人一則無是妻一則同曲富叟王翁無是聞之大驚俄而取者至云諸人盡得唯無是妻誦金剛經善神護之故不得因唱所得人名皆應曰唯無是亦識王翁應聲答曰畢俄而鼓動無是歸家見其妻猶誦經坐待無是既至妻曰汝常不外宿吾恐汝犯夜故誦經不眠相待天曉聞南鄰哭聲無是問之則王翁死矣無是大懼因以具告其妻妻亦大懼因移出宅謁名僧發誓願長齊日則誦經四十九遍由是得免出紀聞陸懷素唐吳郡陸懷素貞觀二十年失火屋宇焚燒並從煙滅惟金剛般若波羅蜜經獨存函及標軸亦盡惟經字竟如故聞者莫不驚歎懷素即高陽許仁則妻之兄也仁則當時目覩常與人言之出冥報記王弘之唐王弘之貞觀中為沁州和川令有女適博陵崔軌軌於和川病卒經數十日其家忽於夜中聞軌語初時傾家驚恐其後乃以為常云軌是女壻雖不合於妻家立靈然而苦無所依但為置立也妻從其請朝夕置食不許置肉唯要素食恆勸禮佛又具說地獄中事云人一生恆不免殺生及不孝自餘之罪蓋亦小耳又云軌雖無罪然大資福助為軌數設齊供并寫法華金剛觀音等經各三兩部自茲已後不即復來王家一依其言寫經設供軌忽更來愧謝因云今即取別舉家哭而送之軌有遺腹之子已年四五六歲軌云此子必有名官願善養育自此不復來矣出太平廣記龍興寺主唐原州龍興寺因大齊會寺主會僧夏臘既高是為宿德坐麗賓頭之下有小僧者自外後至以無坐所唯寺主下曠一位小僧欲坐寺主輒叱之如是數次小僧恐齊失時竟來就坐寺主怒甚倚柱而坐以掌摑之方欲舉手大袖為柱所壓不得下合掌驚駭小僧慚沮不齊而還房衆議恐是小僧道德所致寺主遂與寺衆同往禮敬小僧惶懼自言初無道行不敢濫受大德禮數逡巡走去因問平生作何行業于二十年唯持金剛經衆皆讚嘆謂是金剛護持之力便於柱所焚香頂禮呪云若是金剛神力當還此衣於是隨手而出也出廣異記陳哲唐臨安陳哲者家住餘杭精一練行持金剛經廣德初武康草賊朱潭寇餘杭哲富於財欲搬移産避之尋而賊至哲謂是官軍問賊今近遠群賊大怒曰何物老狗敢辱我爭以劒刺之每下一劒則有五色圓光徑五六尺以蔽哲身刺不能中賊驚歎謂是聖人莫不慚悔捨之而去出廣異記豐州烽子唐永泰初豐州烽子暮出為党項縛入西蕃養馬蕃王令穴肩骨貫以皮索以馬數百蹄配之經半歲馬息一倍蕃王賞以羊革數百因轉近牙帳贊普子愛其了事遂令執纛左右有剩肉餘酪與之又居半年因與酪肉悲泣不食贊普問之云有老母頻夜夢見贊普頗仁聞之悵然夜召帳中語云蕃法嚴無放還例我與爾馬有力者兩匹於某道縱爾歸無言我也烽子得馬極騁俱乏死遂晝潛夜走數日後為刺傷足倒磧中忽風吹物窸窣過於前因攬之裹足有頃不復痛試起步走如舊經宿方及豐州界到家其母尚存悲喜曰自失爾我唯念金剛經寢食不廢以祈見爾今果其誓因取經縫斷亡數幅不知其由子因道磧中傷足事母令解足視之裹瘡乃數幅經也其瘡亦愈出酉陽雜爼張鎰唐丞相張鎰父齊丘酷信釋氏每旦更新衣執經於像前念金剛經十五遍積數十年不懈永泰初為朔方節度使衙內有小將負罪懼事露乃扇動軍人數百定謀反叛齊丘因衙退於小廳間行忽有兵數十露刃走入齊丘左右唯奴僕遽奔宅門過小廳數步回顧又無人疑是鬼物將及宅其妻女奴婢復呌呼出門云有兩甲士身出廳屋上時衙隊軍健聞變持兵亂入至小廳前見十餘人仡然庭中垂手張口投兵於地衆遂擒縛五六人瘖不能言餘者具首云欲上廳忽見二甲士長數丈瞋目叱之初如中惡齊丘聞之因斷酒肉出酉陽雜爼李廷光唐李廷光者為德州司馬敬佛不茹葷血常持金剛經每念經時即有圓光在前用心苦至則光漸大少懷懈惰則光漸小暗因此破礪轉加精進出報應記陸康成唐陸康成嘗任京兆府法曹掾不避強禦公退忽見亡故吏抱案數百紙請押問曰公已去世何得來曰此幽府文簿康成視之但有人姓名略無他事吏曰皆來年兵刃死者問曰得無我乎有則檢示吏曰有因大駭曰君既舊吏得無情耶曰故我來啓明公耳唯金剛經可託即失之乃遂讀金剛經日數十遍明年朱泚果反署為御史康成叱泚曰賊臣敢干國士泚震怒命數百騎環而射之康成默念金剛經矢無傷者泚曰儒以忠信為甲胄信矣乃舍去康成遂入隱於終南山竟不復仕出報應記薛嚴唐薛嚴忠州司馬蔬食長齊日念金剛經三十遍至七十二將終見幢蓋音樂來迎其妻崔氏即御史安儼之姑也屬纊次見嚴隨幢蓋冉冉升天而去呼之不顧一家皆聞有異香之氣出報應記任自信任自信嘉州人唐貞元十五年曾往湖南常持金剛經潔白無點於洞庭湖中有異物如雲舟上俄頃而散舟中遂失自信不知所在久之乃凌波而出云至龍宮謁龍王四五人命升殿念金剛經與珠寶數十事二僧相送出宮一僧憑附少信至衡嶽觀音臺紹真師付之云是汝和尚送來令轉金剛經至南嶽訪僧果見云和尚滅度已五六年矣出報應記假文昌唐貞元十七年假文昌自蘄入蜀應南康王韋皋辟命洎韋之暮年為賊嬖讒構遂攝尉靈池縣韋尋卒賊闢知留後文昌舊與闢不合聞之連夜離縣至城東門闢尋有帖不令諸縣官離縣其夕陰風及返出郭二里見火兩炬夾道百步為導初意縣吏迎候怪其不前高下遠近不差欲及縣郭方滅及門縣吏尚未知府帖也時文昌念金剛經已五六年數無虗日信乎至誠必感有感必應向之道左右乃經所著迹也後闢逆節漸露詔以袁滋為節度使文昌從弟少從軍知左營事懼及禍與監軍定計以蠟丸帛書通謀於袁事旋發悉為魚肉賊為文昌知其謀於一時文昌念經夜久不覺困寐門戶悉閉忽聞開戶而入言不畏者再三若物投案暴然有聲驚起之際音猶在耳顧視左右吏僕皆睡俾燭樺四索初無所見向之門扃已開闢矣文昌受持此經十餘萬遍徵應孔著出酉陽離爼劉逸淮唐劉逸淮在汴時韓弘為右廂虞矦王某為左廂虞矦與弘相善或謂二人取軍情將不利與劉劉大怒召俱詰之弘即劉之甥因控地叩首大言劉意稍解王某年老股戰不能自辨劉叱令拉坐杖三十時新造赤棒頭徑數寸固以筋漆立之不仆數五六當死矣韓意其必死及昏造其家怪無哭聲又謂其不敢哭訪兵門卒即云大使無恙弘素與熟遂至臥內問之云我讀金剛經四十年矣今方得力記初被坐時見巨手如箕翕然遮背因袒示韓都無撻痕韓舊不好釋氏由此始與僧往來日自寫十紙及貴計數百軸矣後在中書盛暑有諫官因事見謁韓方洽汗寫經諫怪問之韓乃具道王某事出因活録孫咸唐梁崇義在襄州未阻兵時有小將孫咸暴卒信宿却蘇言至一處如王者所居儀衛甚嚴有吏引一僧對事僧法號懷秀亡已經年在生極犯戒及入冥無善可録乃紿云我常囑孫咸寫法華經敕咸被追對初咸不省僧固執之經時不決忽見沙門曰地藏語云若弟子招承亦自獲祐咸乃依言因得無事又說對勘時見一戎王衛者數百自外來冥王降階齊級升殿坐未久乃大風卷去又見一人被考覆罪福此人常持金剛經又好食肉左邊有經數千軸右邊積肉成山以肉多將入重論俄經堆中有火一星飛向肉山頃刻銷盡此人遂履空而去咸問地藏向來外國王風吹何處地藏王云彼王當入無間向來風即業風也因引咸看地獄及門煙焰扇赫聲若風雷懼不敢視臨視鑊湯跳沫滴落左股痛入心髓地藏令一吏送歸不許漏泄冥事及回如夢妻兒環泣已一日矣遂破家寫經因請出家夢中所滴處成瘡終身不差出酉陽雜爼僧智燈唐貞元中荊州天崇寺僧智燈常持金剛經遇疾死弟子啓手猶熱不即入木經七日却活初見冥中若王者以念經故合掌降階因問訊曰更容上人十年在世勉出生死又問人間衆僧中後食薏苡仁及藥食此大違本教燈報云律中有開遮條如何云此後人加之非佛意也今荊州僧衆中無有飲藥者出酉陽雜爼王氏公安潺陵村百姓王從貴妹未嫁常持金剛經唐貞元中忽暴病卒埋已三日其家覆墓聞冢中呻吟遂發視之果有氣升歸數日能言云初至冥間冥吏以持經功德放還王從貴能治木嘗於公安靈化寺起造其寺僧曙中嘗見從貴說云出酉陽雜爼左營伍伯唐南康王韋皋鎮蜀時有左營伍伯於西山行營與同火卒學念金剛經性頑初一日才得題目其夜堡外拾薪為藩騎縛去行百餘里乃止天未明遂踣之於地以髮繫橛覆以馳寤其上此人唯念經題忽見金一鋌放光止於前試舉首動身所縛悉脫遂潛起逐金鋌走計行未得十餘里遲明不覺已至家家在府東市妻兒初疑其鬼具陳來由到家五六日行營將方申其逃初韋不信以逃日與至家日不差始免之出酉陽雜爼宋衎宋衎江淮人應明經舉元和初至河陰縣因疾病廢業為鹽鐵院書手月錢兩千娶妻安居不議他業年餘有為米綱過三門者因不識字請衎同去通管簿書月給錢八千文衎謂妻曰今數月不得八千苟一月而致極為利也妻楊氏甚賢勸不令往曰三門舟路頗為險惡身或驚危利亦何救衎不納遂去至其所果遇暴風所擊彼群船盡沒唯衎入水捫得粟藁一束漸漂近岸浮藁以出乃活餘數十人皆不救因抱藁以謝曰吾之微命爾所賜也誓存沒不相捨遂抱藁疾行數里有孤姥鬻茶之所茅舍兩間遂詣宿焉具以事白姥憫之乃為設粥及明旦於屋南曝衣解其稿以晒於藁中得一竹筒開之乃金剛經也尋以訊姥且不知其詳姥曰是汝妻自汝來後蓬頭禮念寫經誠切故能救汝衎感泣請歸姥指東南一徑曰但尋此去校二百里可以後日到家也與米二升拜謝遂發果二日達河陰見事愧謝楊媛驚問曰何以知之盡述根本楊氏怪之衎乃出經楊媛涕泣拜禮頂戴衎曰用何以為記曰寫時執筆者誤羅漢字空維上無四遂詣護國寺禪和尚處請添和尚年老眼昏筆點過濃字皆昏黑但十日來不知其所在驗之果如其說衎更嗚咽拜其妻每日焚香禮經於淨室乃謂楊媛曰河濵之姥不可忘也遣使封茶及絹與之使至其居及人皆不見詰於牧竪曰比水漲無涯際何有人鬻茶復云路亦並無乃神化也數歲相國鄭公絪為東都留守乃召衎及楊媛往問其本末并令將經來與其男武職食月給五千因求其經至今為鄭氏所尊奉故嶽州刺史丞相弘農公因覩其事遂敘之名曰楊媛徵驗出報應記李虗唐開元十五年有敕天下村坊佛堂小者並拆除功德移入側近佛寺堂大者皆令閉封天下不信之徒並望風毀拆雖大屋大佛亦殘毀之敕到豫州新息令李虗嗜酒偓強行事違戾方醉而州符至仍限三日報虗見大怒便約胥止界內毀拆者死於是一界並全虗為人好殺愎戾行必違道當時非惜佛宇也但以忿恨故全之全之亦不以介意歲餘虗病數日死時正暑月隔十即斂明日將殯母與子繞棺哭之夜久哭止聞棺中若指爪棺聲初疑鼠未之悟也斯須增甚妻子驚走母獨不去命開棺左右曰暑月恐壞母怒促開之而虗生矣身頗瘡爛於是浴而將養之月餘平復虗曰初為兩卒拘至王前王不見見階前典吏乃新息吏也亡經年矣見虗拜問曰長官何得來虗曰適被録而至吏曰長官平生唯以殺害為心不知罪福今當受報將若之何虗聞懼請救之吏曰去歲拆佛堂長官界內獨全此功德彌大長官雖死亦不合此間追攝少間王問更勿多言但以此對虗方憶之頃王坐主者引虗見王王曰索李明府善惡簿來即有人持一通案至大合抱有二青衣童子亦隨文案王命啓牘唱罪階吏讀曰專好割羊腳吏曰合杖一百乃割其身肉百斤王曰可令割其肉虗曰去歲有敕拆佛堂毀佛像虗界內獨存之此功德可拆罪否王驚曰審有此否吏曰無新息吏進曰有福簿在天堂可檢之王曰促檢殿前垣南有樓數間吏登樓檢之未至有二僧來至殿前王問師何所有一答曰常誦金剛經一曰常讀金剛經王起合掌曰請法師登階王座之後有二高座右金左銀王請誦者坐金座讀者坐銀座坐訖開經王合掌聽之誦讀將畢忽有五色雲至金座前紫雲至銀座前二僧乘雲飛去空中遂滅王謂階下人曰見二僧乎皆生天矣於是吏撿善簿至唯一紙因讀曰去歲敕拆佛堂新息一生獨全合拆一生中罪延年三十仍生善道言畢罪簿軸中火出焚燒之盡王曰放李明府歸仍敕兩吏送出城南門見夾道並高樓大小男女羅坐樂飲笙歌虗好絲竹見而悅之兩吏謂曰急過此無顧顧當有損虗見飲處意不能忍行佇立觀之店中人呼曰來吏曰此非善處既不相取信可任去虗未悟至飲處人皆起就座奏絲竹酒至虗酬酢畢將飲之乃一杯糞汁也臭穢特甚虗不肯飲即有牛頭獄卒出於牀下以叉刺之洞胸虗遽連飲數杯乃出吏引虗南入荒田小徑中遙見一燈烔然燈旁有大坑昏黑不見底二吏推墮之遂蘇李虗素性凶頑不知罪福而被酒違戾以全佛堂明非己之本心也然猶身得生天火焚罪簿獲福若此非為善之報乎與夫日夜精勤孜孜為善既持僧律常行佛言而不離生死未之有也出紀聞盧氏唐開元中有盧氏者寄住滑州晝日閉坐廳事見二黃衫人入門盧問為誰答曰是里正奉帖追公盧甚愕然問何故相追因求帖觀見封上作衛縣字遂開文字錯謬不復似人書怪而詰焉吏言奉命相追不知何故俄見馬已備在階下不得已上馬去顧見其尸坐在牀上心甚惡之倉卒之際不知是死又見馬出不由門皆行墻上乃驚愕不泣方知必死恨不得與母妹等別行可數十里至一城城甚壯麗問此何城吏言乃王市即追君所司入城後吏欲將盧見王經一院過問此何院吏曰是御史太夫院因問院大夫何姓名云姓李名某盧驚喜白吏曰此我表兄令吏通刺須臾便出相見甚喜具言平昔延入坐語大夫謂曰弟之念誦功德甚多良由金剛經是聖教之骨髓乃深不可思議功德者也盧初入院中見數十人皆是衣冠其後太半繫在網中或無衣或露頂盧問此悉何人云是陽地衣冠網中悉緣罪重弟若能為一說法見之者悉得升天遂命取高座令盧升座誦金剛般若波羅蜜經網中人已有出頭者至半之後皆出地上或褒衣大袖或乘車御雲誦既終往生都盡及入謁見王呼為法師致敬甚厚王云君大不可思議算又不盡歎念誦之功尋令向吏送之回既至舍見家人披頭哭泣尸臥地上心甚惻然俄有一婢從庭前入堂吏令隨上階及前魂神忽已入體因此遂活出廣異記王宏王宏者少以漁獵為事唐天寶中嘗放鷹逐兔走入穴宏隨探之得金剛般若經一卷自此遂不獵云出廣異記
