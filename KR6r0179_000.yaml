front:
  text: 金剛般若經靈驗傳目録卷上五祖大師六祖大師明教大師中峯和尚瑞雪崖一溪田子中亭湖神蕭瑀趙文若趙文昌張政蒯武安陳惠妻杜之亮慕容文䇿王殷王翰張無是陸懷素王弘之龍興寺主陳哲豐州烽子張鎰李廷光陸康成薛嚴任自信假文昌劉逸淮孫咸僧智燈王氏左營伍伯宋衎李虗盧氏王宏卷中張嘉猷陳昭王忠幹王稱李元一魚萬盈于李回強伯達僧惟恭王沔張御史費子玉錢方義巴南宰元初宋義倫楊復恭弟董進朝康仲戚吳可久僧法正沙彌道蔭何老勾龍義趙安寧勉倪勤高涉張政皇甫恂蔡州行者販海容曹州濟陰縣精舍李思一李觀陳文達高紙竇德玄卷下李岡智藏李丘一于昶裴宣禮吳思玄薛少殷盧辨鉗耳含光王陀王令望何澋張玄素田氏李惟燕孫明三刀師宋參軍劉鴻漸釋祖南釋明勳房翥孤元軌壽昌禪師龔德莊周縉尼淨真王氏女黃婆孫大玕居士附録金剛般若經靈驗傳目録終
