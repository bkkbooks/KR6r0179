body:
  text: 李岡唐兵部尚書李岡得疾暴卒唯心上煖三日復蘇云見一人引見大將軍蒙令坐索案看云錯追公有頃獄卒擎一盤來中置鐵丸數枚復舁一鐺放庭中鐺下自然火出鐺中銅汁湧沸煑鐵丸赤如火獄卒進盤將軍以讓岡岡懼云飽將軍吞之既入口舉身洞然又飲銅汁身遂火起俛仰之際吞並盡良久復如故岡乃前問之答云地下更無他饌唯有此物即吸食之若或不飡須臾即為猛火所焚苦甚與此唯與寫佛經十部轉金剛經千卷公亦不來吾又離此岡既復生一依所約深加敬異出報應記智藏梁智藏吳郡人住鍾山開善寺遇相者謂曰法師聰明葢世惜命不長止三十一耳時年二十有九於是罷講探經藏得金剛經竭誠誦讀禮佛懺悔晝夜不輟至期忽聞空中聲曰汝壽本盡以般若功德力得倍壽矣後見前相者驚異莫測藏陳其故始知經力不可思議出緇門崇行錄李丘一唐李丘一好鷹狗畋獵萬歲通天元年任楊州高郵丞忽一旦暴死見兩人來追一人自云姓叚時同被追者百餘人男皆著枷女即反縛丘一被鎖前驅行可十餘里見大槐樹數十下有馬槽叚云五道大神每巡察人間罪福於此歇馬丘一方知身死至王門叚指一胥云此人姓焦名䇿是公本頭遂被領見王曰汝安忍無親好殺他命以為己樂須臾即見所殺獸禽皆為人語云乞早處分焦䇿進云丘一未合死王曰曾作何功德云唯曾造金剛經一卷王即合掌云冥間號金剛經最上功德君能書寫其福不小即令焦䇿領向經藏令驗至一寶殿眾經充滿丘一試抽一卷果是所造之經既迴見王知造有實乃召所殺生類令懇陳謝許造功德丘一依王命願寫金剛經一百卷眾歡喜盡散王曰放去焦䇿領出城門云盡力如此豈不相報丘一許錢三百千不受與造經二十部至一坑䇿推之遂活身在棺中唯聞哭聲已三日矣驚呼人至破棺乃起旬日寫經二十卷了焦䇿來謝致辭而去尋百卷亦畢揚州刺史奏其事勅加丘一五品仍充喜州招討使出報應記于昶唐于昶天后朝任并州錄事參軍每至一更後即喘息流汗二更後愈妻柳氏將召醫工昶密曰自無他苦但晝決曹務夜判冥司事力不任耳每知有災咎即陰為之備都不形言凡六年後丁母難持金剛經更不復為冥吏因極言此功德力令子孫佩轉後為慶州司馬年八十四將終忽聞異香非代所有謂左右曰有聖人迎我往西方言訖而沒出報應記裴宣禮唐裴宣禮天后朝為地官侍郎常持金剛經坐事被繫宣禮憂迫唯至心念經枷鎻一旦自脫推官親訪之遂得雪免御史任植同禁亦念經獲免出報應記吳思玄唐吳思玄天后朝為大學博士信釋氏持金剛經日兩遍多有靈應後稍怠日夜一遍思玄在京病有巫褚細兒言事如神星下祈禱思玄往就見細見驚曰公有何也鬼見皆走思玄私負知是經乃倍加精勵日念五遍兄疾醫無効思玄至心念經三日而愈思玄曾於渭橋見一老人年八十餘著麤縗服問之曰為所生母也思玄怪之答曰母年四十三時有異僧教云汝欲長壽否但念金剛經母即發心口念兩遍本一百七十及鄰母誦過百歲今遵母業已九十矣出報應記薛少殷河東薛少殷舉進士忽一日暴卒於長安崇義里有一吏持牒云大使追引入府門既人見官府即鮮于叔明也少殷欲有所訴叔明曰寒食將至何為鏤雞子食也東面有一僧手持寶塔扇雙開少殷已在其中叔明曰日某方欲上事和尚何為救此人乃迫而出令引少殷見判官及出門之西院閽者入白逡巡聞命素服乃入所見乃亡兄也敘泣良久曰吾以汝未成名欲薦汝於此分主公事故假追來非他也少殷時新婚懇不願住兄曰吾同院有王判官職居西曹汝既來此可以一謁而去乃命少殷於西院見之接待甚厚俄聞備饌海陸畢備未食王判官忽起顧見向者持塔僧曰不可食食之則無由歸矣少殷曰飢甚奈何僧曰唯蜜煎姜可食乃取食之而王判官竟不至僧曰可去矣少殷復出詣兄泣且請去兄知不可留乃入白官府許之少殷曰既得歸人間願知當為何官兄曰此甚難言亦何用知之懇請乃召一吏取籍尋閱不令見之曰汝後年方成名初甚當極西得之次歷畿赤簿尉又一官極南此外吾不得知臨別兄曰吾舊使祇承人李俊令隨汝去有危急即可念之既去每遇危際皆見其僧前引少殷曰弟子素不相識和尚何乃見護如此僧曰吾為汝持金剛經故相護爾雅醒具述其事後年春果及第未幾授秘書省正字充和蕃判官及迴改同官主簿秩滿遇趙昌為安南節度少殷與之有舊求為從事欲厭及南之官昌許之曰乘遞之鎮未暇有表至江陵當以表請及表至少殷尋以丁母憂服除選授萬年縣尉時青淄卒吏與駙馬家僮鬪死京兆府不時奏德宗赫怒時少殷主戒唐一日乃貶高州雷澤縣尉十餘年備歷艱苦而李俊常有所護及順宗嗣位有詔收錄貶官少殷移至珪陽與貶官李定同行過水勒馬與一從人言即李俊也云某月日已足拜別而去少殷曰吾兄言官止於此李俊復去將不久矣李定驚慘其事因問具以告之數日而卒出前定錄盧弁盧弁者其伯任湖城令弁自東都就省夜宿第二谷夢中見二黃衣吏來追行至一所有城壁入城之後欲過判官屬有使至判官出迎吏領住一舍下其屋上有蓋下無梁柱下有大磨十枚磨邊有婦女數百磨恒自轉牛頭卒十餘以大箕抄婦人置磨孔中隨磨而出骨肉粉粹苦痛之聲所不忍聞弁於眾中見其伯母即湖城之妻也相見悲喜各問其來由弁曰此等受罪云何曰坐妬忌以至於此弁曰為之奈何伯母曰汝素持金剛經試為我誦或當滅罪弁因持經磨遂不轉受罪者小息牛頭卒持叉來弁所怒曰何物郎君來此誦經度人作事弁對曰伯母在此卒云若惜伯母可與俱去弁遂將伯母奔走出城各歸就活初弁唯一小奴同行死已半日其奴方欲還報會弁已蘇後數日至湖城入門遇伯設齊家人見弁驚喜還報伯母迎執其手曰不遇汝當入磨中今得重生汝之力也出廣異記鉗耳含光竺山縣丞鉗耳含光者其妻陸氏死經半歲含光秩滿從家居竺山寺有大墩暇日登望忽於墩側見陸氏相見悲喜問其死事便爾北望見一大城云所居在此邀含光同去入城城中屋宇壯麗與人間不殊傍有一院院內西行有房數十間陸氏處第三房夫婦之情不異平素衣玩服具亦爾久之日暮謂含光曰地府嚴切君宜且還後日可領兒子等來欲有所囑明日不煩來也及翌日含光又往陸氏見之驚愕曰戒卿勿來何得復至頃之有緋衣吏侍從數十人來入院陸氏令含光入牀下垂氈至地以障之戒使勿視恐主客有犯俄聞外呼陸四娘陸氏走出含光初甚怖懼後稍竊視院中都有二十八婦人緋衣各令解髻兩兩結投釜中冤楚之聲聞乎數里火滅乃去陸氏徑走入房含光見入接手牀上良久悶絕既窹含光問平生齋菜誦經念佛何以更受此苦答云昔欲終時有僧見詣令寫金光明經當時許之病亟草草遂忘遺囑坐是受妄語報罹此酷罰所欲見兒子者正為造金光明經今君已見無煩兒子也含光還家乃具向諸子說其事悲泣終夕及明往視已不復見但荒草耳遂貨家產得五百千刺史已下各有資助滿二千貫文乃令長子載往五臺寫經至山中遍歷諸臺未有定居尋而又上臺山路之半遇一老僧謂之曰寫經救母何爾遲廻留錢於臺宜速還寫金剛經也言訖不見其子知是文殊菩薩留錢而還乃至舍寫經畢上墩又見地獄因爾直入遇閉門乃扣之門內問是誰鉗耳贊府即云是我久之有婦人出曰貴閤令相謝寫經之力已得託生人間千萬珍重含光乃問夫人何故居此答云罪狀頗同故復在此爾出廣異記王陀唐王陀為陰陽府果毅因病遂斷葷肉發心誦金剛經日五遍後染瘴見群鬼來陀即急念經鬼聞便退遙曰王令追汝且止誦經陀即為歇鬼悉向前陀乃昏迷欲絕須又見一鬼來云念經人王令權放六月既寤遂一心持誦晝夜不息六月雖過鬼亦不來夜聞空中有聲呼曰汝以持經功德當壽九十矣竟如其言出報應記王令望唐王令望少持金剛經還卭州臨溪路極險阻忽遇猛獸振怖非常急念真經猛獸熟視曳尾而去流涎滿地曾任安州判司過楊子江夜風暴起租船數百艘相接盡沒唯令望船獨全後終亳州譙令出報應記何澋唐何澋天授初任懷州武德令常持金剛經至河陽水漲橋倒日已夕人爭上船岸遠未達欲沒澋懼且急念經須近岸遇懸蘆攀緣得出餘溺死八十餘人出報應記張玄素唐張玄素洛陽人少持金剛經天授初任黃梅宰家有厄難應念而消年七十遘忽有華蓋垂空遂澡浴與家人訣別奄然而卒出報應記田氏易州參軍田氏性好畋獵恒養鷹犬為事唐天寶初易州放鷹於叢林棘上見一卷書取視之乃金剛經也自爾發心持誦數年已誦二千餘遍然畋獵亦不輟後遇疾暴卒數日被追至地府見諸鳥獸周廻數畝從己徵命頃之隨到見王問罪何多也田無以對王令所由領往推問其徒十人至吏局吏令啟口以一丸藥擲口中便成烈火遍身須灰滅俄復成人如是六七輩至田氏累三丸而不見火狀吏乃怪之復引見王具以實白王問在生作何福業田氏云初以畋獵為事王重問云在生之時於易州棘上得金剛經持誦已二千餘遍王云正此滅一切罪命左右檢田氏福簿還白如言王自令田氏誦經纔三紙廻視庭中禽獸並不復見誦畢王稱美之云誦二千遍延十五年壽遂得放還出廣異記李惟燕建德縣令李惟燕少持金剛經唐天寶末惟燕為餘姚郡參軍秩滿北歸過五丈店屬上虞江埭塘破水竭時中夜晦瞑四廻無人此路舊多劫盜惟燕舟中有吳綾數百疋懼為賊所取因持一劒至船前誦經三更後見堤上兩炬火自遠而至惟燕疑是村人衛己火去船百步便却復廻心頗異之愈益厲聲誦經亦竊自思云火之所為得非金剛經力乎時塘水竭而塘外水滿惟燕便心念塘破當得水助半夕之後忽聞船頭有流水聲驚云塘闊數丈何由得破久之稍覺船浮及明河水已滿對船所一孔大數尺乃知誦金剛經之助云惟燕弟惟玉見任處州別駕見其兄誦經有功因效之後泛舟出峽水急櫓折船將欲敗乃力念經忽見一櫓隨流而下遂獲濟其族人亦常誦金剛經遇安祿山之亂伏於荒草賊將至思得一鞋以走俄有物落其背驚視乃新鞋也出廣異記孫明唐孫明者鄭州陽武人也世貧賤為盧氏莊客善持金剛經日誦二十遍經二十年自初持經便絕葷血後正念誦次忽見二吏來追明意將是縣吏便縣去行可五六里至一府門門人云王已出巡吏因閉於明空室中其室從廣五六十間蓋若蔭雲經七日王方至吏引明入府王問汝有何福答云持金剛經已二十年王言此大福也顧謂左右曰昨得祇洹家牒論明念誦勤懇請延二十載乃知修道不可思議所延二十載以償功也令吏送還舍其家殯明已畢神雖復體家人不知之也會獵者從殯宮過聞號呼之聲報其家人因爾得活矣天寶末明活已六七年甚無恙也出廣異記三刀師感應傳中已雖載之詳略不同故再揭之唐三刀師者俗姓張名伯英乾元中為壽州徤兒性至孝以其父在頴州乃盜官馬往以迎省至淮陰為守遏者所得刺史崔昭令出城腰斬時屠劊號能行刀再斬初不傷損乃換利刀罄力砍不損如故劊者驚曰我用力砍至其身則手懦不知何也遽白之昭問所以答曰昔年十五曾絕葷血誦金剛經十餘年自胡亂以來身在軍中不復念誦昨因被不測罪唯志心念經爾昭歎息舍之遂削髮出家著大鐵鈴乞食修千人齋供一日便辨時人呼為三刀師謂是起敬菩薩出廣異記宋參軍唐坊州宋參軍少持金剛經及之官權於司士宅住舊知宅凶每夕恒誦經忽見婦人立於戶外良久宋問汝非鬼耶曰然又問幽明理殊當不宜見得非有枉屈之事乎婦人便悲泣曰然言身是前司士之婦司士奉使其弟見逼拒而不從因此被殺以氈裹屍投於堂西北角圂廁中不勝穢積人來多欲陳訴俗人怯懦見形必懼所以幽憤不達凶惡驟聞執事以持念為功當亦大庇含識眷言枉穢豈不憫之宋云己初官位卑不能獨救翌日必為上白府君其鬼乃去及明具白掘地及圂不獲其尸宋誦經婦人又至問何以不獲答曰西北只校一尺明當求之以終惠也依言乃獲之氈內但餘骨在再為洗濯移於別所其夕又來拜謝歡喜謂曰垂庇過深難以上答雖在冥昧亦有所通君有二子大者難養小者必能有後且有榮位兼言宋後數改官祿又云大媿使君不知何以報答宋見府君具敘所論府君令問己更何官至夕婦人又至因傳使君意云一月改官然不稱意當遷桂州別駕宋具白其事皆有驗初宋問身既為人所殺何以不報云前人今尚為官命未合死所以未復云也出廣異記劉鴻漸劉鴻漸者御史太夫展之族子唐乾元初遇亂南徙有僧令誦金剛經鴻漸日誦經至上元年客於壽春一日出門忽見二吏云奉大尉牒令追鴻漸云初不識大尉何以見命意欲抗拒二吏忽爾直前拖曳鴻漸請著衫吏不肯放牽行未久倐過淮至一村須持大麻衫及腰帶令鴻漸著笑云真醋大衫也因而向北行路漸梗澁前至大城入城有府舍甚嚴麗忽見向勸讀經之僧從署中出僧後童子識鴻漸徑至其所問十郎郎何以至此因走白和尚云劉十六郎適為吏追以誦經功德豈不徒彼救之鴻漸尋至僧所虔禮求救僧云弟子行無苦須吏引鴻漸入詣廳事案後有五色浮圖高三四尺廻旋轉動未及考問僧已入問浮圖變成美丈夫年三十許云是中丞降階接僧問和尚何以復來僧云劉鴻漸是己弟子持金剛經功力甚至其筭又未盡宜見釋也王曰若持金剛經當願聞耳因令跪誦鴻漸誦兩紙訖忽然遺忘廳西有人手持金鉤龍頭幡幡上碧字書金剛經布於鴻漸前令分明誦經畢都不見人但餘堂宇閴寂因爾出門唯見追吏忽有物狀如兩日來擊鴻漸鴻漸惶惧奔走忽見道傍有水鴻漸欲止而飲之追吏云此是人膏澄久上清耳其下悉是餘皮爛肉飲之不得還矣須至舍見骸形臥在牀上心頗惆悵鬼從後推之冥然如入房戶遂活鬼得錢乃去也出廣異記釋祖南宋釋祖南居南嶽之雲峰刺血書阿彌陀經五百卷金剛經一百卷法華經十部終二十七年皆用血書末年血乾骨立念佛聲不絕一日在方丈坐化眉間迸出舍利隨取隨生出法華持驗記釋明勳明釋明勳徽人原名胡文柱天啟時為中書舍人以不從魏璫書經命褫官至丙戌忽患人面瘡痛不可忍辛卯冬暈絕恍惚聽瘡作人言曰予梁時盧昭容也在雒陽宮中遭賊戕命今已六百餘年尚滯鬼籍而君即當日戕予者今既轉身為男子當書法華等經以自敕救予文柱哀祈住痛即書時居儀真立具紙筆書法華華嚴金剛楞嚴等經及水懺每書時痛輒止停筆復痛踰年書經完患遂愈丁酉夏遇堆山於德度詳述斯事但未辨為蕭梁為朱梁李太史明睿王子猷定諸人題䟦亦皆不及審定堆山曰此朱梁也蕭梁時雒陽屬魏且昭容亦唐官人位號乃擁護昭宗而被害者若非朱友珪即氏叔琮耳遂訂而題其冊見薛公宷今堆山道者米筆記按堆山考據最悉但如此則梁昭容應作唐昭容或胡君憒絕中唐梁聲近而訛未可知也周石續志房翥代州房翥曾勸一老人念佛其老人得生西方入冥見閻羅王乃再放還世汝當生淨土翥有一萬遍金剛經願兼敬禮五臺此心未遂未欲往生出瑞應刪傳孤元軌唐貞觀五年有隆州巴西縣令孤元軌者信敬佛法欲寫法華金剛般若涅槃等無由自撿憑彼土抗禪師撿挍抗乃為在寺如法潔淨寫了下袠還歧州莊所經留在莊并老子五千文同在一處忽為外火延燒堂宇是草覆一時灰蕩軌于時任憑翊縣令家人相命撥灰覔金銅軸既撥灰開其內諸經宛然如故潢色不改唯箱袠成灰又覔老子便從火化于時聞見之者鄉村遠近莫不嗟異其金剛般若經一卷題字焦黑訪聞所由乃初題經時有州官能書其人雜食行急不獲潔淨直爾立題便去由是色焦其人現在瑞經亦存京師西明寺主神察目驗說之出法苑珠林壽昌禪師謹按狀師諱慧經號無明撫州崇仁裴氏子初產難祖父誦金剛經遂得娩因名經師生而頴異不羣形儀蒼古若逸鶴淩空天性澹然無嗜好九歲入鄉校便問浩然之氣是個甚麼師異之居恒若無意於人間世者秊十七遂棄筆硯慨然有向道志秊二十一偶入居士舍見案頭金剛經閱之輒終卷忻然若獲故物即與士言其意士奇之師由是斷葷酒決出世志父母聽之時邑之蘊空忠禪師說法於廩山遂往依之即其本名曰慧經執侍三載凡聞所教不違如愚嘗疑金剛經四句偈一日見傅大師頌曰若論四句偈應當不離身師不覺灑然因述偈有遍界放光明之句以是知為夙習般若熏發也出壽昌語錄龔德莊秘書省校書郎龔德莊初罷官靈壽來歸京師居新門裏時方上元山東劉野夫與德莊善偶折簡來約十四日可盡室往觀君慎勿出略相候欲欵語德莊素敬憚其人為獨守屋廬二鼓矣而野夫不至方假寐家人輩尚未還俄火自門而燒德莊但捉誥牒而走一夕而燼數百家明日迹其屋灰炭中得金剛般若一卷略無損處開視明鮮如新德莊少豪逸嗜酒色不甚信內典豈夙世善根不思議力以茲發感悟之歟觀者彭凡鄒正臣劉棐僧希祖德洪政和元年上元後一日出石門文字禪周縉杭州周縉頗知書聚二三童子講習市中日誦金剛經甚謹童子閔生觸飜佛前燈油染於經杭之民俗凡經像幣汙輒投濤江縉因束以紅𦦨倣其後行之時元之大德庚子也越三年癸卯經忽還於舊所半為潮沙所裹而紅燄如故縉驚喜與吳門僧儉拂去沙塵其粘綴者逐番分折之徧請叢林開士題識左方後八十一年當國朝洪武庚申經入沙門宥悌之手復重加裝𥚚即南屏山中請濂說贊贊曰至誠動物靡間毛髮此感彼應如磁引鍼況乎契經世雄所說至心受持昭答如響昔周氏子朝夕嚴事經有染汙投諸江潮閱三春秋忽返元所經實紙成難同鉄石非金剛力焉能不壞經無羽足不能飛行非金剛力誰挾而至由此而觀佛語所至百神訶衛無能損者然而此經觚翰所假雖載佛言靈從何起世之法藏所摸經文充棟汗牛未聞皆驗應知萬法實本一心由心誠故而經應之心靈經靈理無疑者是知此心其大無外其小無內神通妙用一一具足不假外求有能精進入在上乘證妙覺位亦無留難今因贊經推而達之欲作佛者此心即是善思念之慎勿退轉出宋景濂護法錄尼淨真尼淨真住長安積善寺納衣乞食一生無瞋講金剛經十萬遍專精念佛顯慶五年七月染患語弟子曰五月內十度見阿彌陀佛又兩度見極樂世界寶蓮華上童子遊戲又有聖僧五度授記曰我當作佛又曰吾得上品往生跏趺而終經宿却醒語弟子曰吾得菩薩位也遍歷十方供養諸佛言訖而終光照於寺出瑞應刪傳王氏女宋吉安王氏女日誦彌陀金剛觀音諸經念佛求度母死既殮惡血滴瀝女發誓云若我孝心願臭氣不作言訖流血即止父娶後室與同修淨業後得疾請僧說淨土觀法忽索衣吉祥而臥攬觀音手所執幡寂然不動母篩灰於地以驗受生見灰中出蓮花數朵出袾宏往生集黃婆宋潮山黃婆持金剛法華專心念佛忽患痢但飲水不食隣菴僧善修夢婆來謂曰將往西方越二日婆西向念佛端坐而化遠近皆見紅霞覆婆之屋出袾宏往生集孫大玕居士大明孫叔子法名大玕自幼警敏端確年十二隨父鏡吾居士奉四十八願彌陀像入雲棲因受五戒歸而斷葷血息交遊罷呫嗶矢志念佛誓取金臺而勤苦不惜身命俄而見兩比丘持蓮花以一心淨土印可復見化人誦金剛經一晝夜乃矍然起坐曰彌陀觀音皆來迎我結金剛拳印大呼阿彌陀佛數聲泊然而寂時萬曆辛亥十一月十一日也有淨土十二時歌傳世詳具吳太史西生傳中出袾宏往生集附錄金剛是喻最堅最利萬物不能加損而能壞萬物者般若是法此云智慧智有決擇之功慧有照了之用又智照諸法實相慧了諸法無生然有體有用肇論云諸法實相謂之般若即金剛體堅經云信心清淨則生實相又云設化眾生謂之漚和即金剛用利經云我應滅度一切眾生而無有一眾生實滅度者又云涉有未始迷虗故常處有而不染經云不應住色生心不應住聲香味觸法生心又云不厭有而觀空故觀空而不證經云應無所住而生其心乃體外無用用外無體一念之力權實雙彰不同二乘人空慧眼故喻如金剛波羅蜜此云彼岸到喻涅槃妙心若有我法二執則有分段變易二種生死名為此岸乘般若之舟楫渡我法之中流離二種生死此岸到菩提涅槃彼岸故名波羅蜜問曰真般若者清淨如虗空無知無見無作無緣今釋迦出世說法利生令眾生離我法斷生死修般若證涅槃然後如來示寂則凡聖能所生滅修證皆是妄情何名真般若也答曰不然佛真法身猶若虗空應物現形如水中月水清月現月亦不來水濁月昏月亦不去經云不可以身相得見如來則應化非真實也又云譬如有人身如須彌山王佛說非身是名大身此報身不可得也又云無有少法可得是名阿耨多羅三藐三菩提此法身無所得也佛既無得法豈可說所以世尊談經三百餘會說法四十九年未嘗說著一字淨名云三轉法輪於大千其輪本來常清淨經云若見如來有所說法即為謗佛無法可說是名說法能化既爾所化亦然煩惱本空我法何有既無二執奚用斷除如兔角龜毛名實俱妄經云我相即是非相人相眾生相壽者相即是非相所言法相者如來說即非法相譬如幻瞖妄見空花瞖若除空花奚有眾生煩惱妄見生死煩惱若除生死安在如皮既不存毛何所附圓覺云生死與涅槃凡夫及諸佛同為空花相經云一切眾生即非眾生我法所照之境般若能照之心我法本空誰為所照既無所照之境則無能照之心能所雙忘修即無修經云以無我無人無眾生無壽者修一切善法即得阿耨多羅三藐三菩提須菩提所言善法者如來說即非善法是名善法煩惱與菩提生死及涅槃皆對待之辭也然離煩惱得菩提斷生死證涅槃乃隨他意語非如來稱性之談以般若智照煩惱本空菩提焉有生死原寂涅槃安寄放光云菩提有所得耶答曰不也亦有亦無得耶答曰不也非有非無得耶答曰不也然則都無所得耶答曰不也以無所得而得也是故得無所得也肇云眾生非眾生誰為得之者涅槃非涅槃誰為可得者經云實無有法得阿耨多羅三藐三菩提實無眾生得滅度者般若能證之智涅槃所證之理修即無修則無能證之智證即無證則無所證之理忘能所滅影像盤山云光非照境境亦非存光境俱忘復是何物化緣既畢入滅歸真如薪盡火滅法華云若見如來常在不滅不能生難遭之想恭敬之心是故如來雖不實滅而言滅度譬如醫師為治狂子故實在而言滅故云常在靈鷲山及餘諸住處楞伽云無有涅槃佛無有佛涅槃遠離覺所覺是二悉俱離莊生云適來夫子時也適去夫子順也安時而處順哀樂不能入也指窮於為薪火傳也不知其盡也經云無所從來亦無所去故名如來此則滅無所滅也然則涅槃虗而無相般若寂而無知本無生死起滅亦無煩惱縛脫以如如智契如如理理外無智智外無理理智雙泯絕言絕思是以釋迦摩竭掩室淨名毗耶默然空生岩中晏坐帝釋滿空雨花豈曰無辯辯所不能言也經者常也三世諸佛不易故又云徑也通凡入聖之路故因空生請問經名世尊答云是經名為金剛般若波羅蜜乃至然佛說法分為五時般若即當第四時又般若分八部大般若放光般若光讚般若道行般若小品般若金剛般若實相般若摩訶般若此即大般若中第五百七十七卷又外有六譯後秦羅什後魏菩提留支陳朝真諦隨朝笈多唐初玄奘大周義淨今所傳即秦譯也明西淅海鹽宗福菴沙門如觀所述金剛般若波羅密多經筆記首題釋䟦金剛經之靈驗和漢古今所傳豈毛楮悉所舉哉今夫和朝之感應散在乎諸書者且置唯於異域書中局見所及者不分緇素不論前後隨得記之題曰金剛般若波羅蜜經靈驗傳因與感應傳及新異錄併鋟梓以遺世之同志云旹貞享五戊辰載八月下澣沙門妙幢淨慧謹䟦
