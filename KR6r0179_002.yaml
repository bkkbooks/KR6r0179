body:
  text: 張嘉猷廣陵張嘉猷者唐寶應初為明州司馬遇疾卒載喪還家葬於廣陵南郭門外永泰初其故人有勞氏者行至郭南坐浮圖下忽見猷乘白馬自南來見勞下馬相慰如平生然不脫席帽低頭而語勞問冥中有何罪福猷云罪福昭然莫不隨所為而得但我素持金剛經今得無纍亦當別有所適在旬月間耳卿還為白家兄令為轉金剛經一千遍何故將我香爐盛諸惡物卿家亦有兩卷經幸為轉誦增己之福言訖遂訣而去勞昏昧久之方寤云出廣異記陳昭唐元和初漢州孔目典陳昭因患病見一人著黃衣至牀前云趙判官喚爾昭問所因云至自冥間劉闢與竇縣對事要召為證昭即留坐逡巡又一人手持一物如毬胞前吏怪其遲答曰只緣此候屠行開因笑謂昭曰君勿懼取生人氣須得猪胞君可面東側臥昭依其言不覺已隨二吏行路甚平可十里餘至一城大如府城甲士守門及入見一人怒容可駭即趙判官也語云劉闢敗東川竇縣捕牛四十七頭送梓州稱准劉闢判殺闢又云先無牒君為孔目典合知事實未及對隔壁聞竇懸呼陳昭何在及問兄弟妻子存亡昭即欲參見冥吏云竇使君形容極惡不欲相見吏乃具說殺牛實奉劉尚書委曲非牒也紙是麻見在漢州某私房架上即令吏領昭至漢州取之門館扃鎖乃於節竅中出入委曲至闢乃無言趙語昭爾自有一過知否竇縣所殺牛爾取一牛頭昭未及答趙曰此不同人間不可假也須臾見一卒挈牛頭而至昭即恐懼求救趙令檢格合決一百考五十日因謂昭曰爾有何功德昭即自陳曾設若干齊𦘕佛像趙云此來生福耳昭又言曾於表兄家讀金剛經趙曰可合掌請昭如言有頃見黃襆箱經自天而下住昭前昭取視之即表兄所借本也褾有燒處尚在又合掌其經即滅趙曰此足以免便放回令昭往一司曰生祿按檢其修短吏報云昭本名釗是金旁刀至其年改為昭更得十八年昭聞惆悵趙笑曰十八年大得作樂事乎不悅乎乃令吏送昭至半道見一馬當路吏云此爾本屬可乘此即騎乃活死半日矣出酉陽雜爼王忠幹唐元和三年李同捷阻兵滄洲景帝命李祐統齊德軍討之初圍德州城城堅不翌日又攻之自卯至未傷十八九竟不能拔時有齊州衙內八將官健𤦤忠幹博野縣人長念金剛經積二十餘年日數不闕其日忠幹上飛梯將及堞身中箭如蝟為櫑木繫落同火卒曳出羊馬城外置之水濠裹岸祐以暮夜命抽軍其時城上矢下如雨同火忙忘取忠幹尸忠幹既死如夢至荒野遇大河欲渡無因仰天哭忽聞人語聲忠幹見一人長丈餘疑其神人因求指營路其人云爾莫怕我令爾可得渡此河忠幹拜之才頭低未舉神人把腰擲之空中久方著地忽如夢覺聞賊城上交二更初不記過水亦不知瘡擡手捫面血塗眉睫方知傷損乃舉身強行百餘步却倒復見向人持刀叱曰起起忠幹驚懼走一里餘坐歇方聞本軍喝號聲遂及本營訪同火卒方知其身死水濠岸裡即是夢中所過河也出酉陽雜爼王稱王稱家於晉陽性頑鄙唐元和四年其家疾疫亡者十八九唯稱偶免方疾食狗肉目遂盲不知醫藥唯禱鬼神數年無報忽有一異僧請飯謂曰吾師之文有金剛經能排衆苦報應神速居士能受之乎稱辭愚又無目固不可記僧勸寫之稱從其言得七卷請其僧之數日夢前僧持刀決其目乃驚寤覺有所見久而遍明數月如舊稱終身轉經不替出報應記李元一李元一唐元和五年任饒州司馬有女居別院中宵忽見神人驚悸而卒顏色不改其夫嚴訥自秦來至蒼湖恍惚見其妻行水上而至訥驚問之妻泣曰某已亡矣今鬼也訥駭異之曰近此鴈浦村有嚴夫子教衆學彼有奇術公往懇請哀救某庶得復生矣訥後果見嚴夫子拜謁泣訴盡啓根本嚴初甚怒郎君風疾何乃見凌訥又拜悲泣久乃方許曰殺夫人者王將軍也葬在此堂內西北柱下可為寫金剛經令僧轉讀於其所祠焉小娘子必當還也訥拜謝疾往郡城明日到具白元一寫經速令讀之七遍女乃開目久之能言愧謝其夫曰茲堂某柱下有王將軍枯骨抱一短劍為改葬之劍請使留以報公德發之果驗遂改瘞留其劍元一因寫經數百卷以施冥寞出報應記魚萬盈魚萬盈京兆市井粗猛之人唐元和七年其所居宅有大毒蛇其家見者皆驚怖萬盈怒一旦持巨棒伺其出擊殺之烹炙以食因得疾臟腑痛楚遂卒心尚微暖七日後蘇云初見冥使三四人追去行暗中十餘里見一人獨行其光繞身四照數尺口念經隨走就其光問姓字云我姓趙字某常念金剛經者汝但莫離我使者不敢進漸失所在久之至其家萬盈拜謝曰向不遇至人定不回矣其人授以金剛經念得遂還及再生持本重念更無遺闕所疾亦失因斷酒肉不復殺害日念經五十遍出報應記于李回于李回舉進士唐元和八年下第將歸有僧勸曰郎君欲速及第何不讀金剛經遂日念數十遍至王橋宿因步月有一美女與言遂被誘去十餘里至一村舍戲笑甚喧引入升堂見五六人皆女郎李回慮是精怪乃陰念經忽有異光自口出群女震駭奔走但聞腥穢之氣蓋狐狸所宅榛棘滿目李回茫然不知所適俄有白犬色逾霜雪似導李回前行口中有光復照路逡巡達本所後至數萬遍出報應記強伯達唐強伯達元和九年家於房州世傳惡疾子孫少小便患風癩之病二百年矣伯達才冠便患囑於父兄疾必不起慮貼後患請送山中父兄裹糧送之巖下泣涕而去絶食無幾忽有僧過傷之曰汝可念金剛經內一四句偈或脫斯苦伯達既念數日不絶方晝有虎來伯達懼甚但瞑目至誠念偈虎乃遍䑛其瘡唯覺凉冷如傅上藥了無他苦良久自看其瘡悉已乾合明旦僧復至伯達具說僧即於山邊拾青草一握以授曰可以洗瘡但歸家煎此以浴乃嗚咽拜謝僧撫背而別及到家父母大驚異因啓本末浴訖身體鮮白都無瘡疾從此相傳之疾遂止念偈終身出報應記僧惟恭唐荊州法性寺僧惟恭三十餘年念金剛經日五十遍不拘僧儀好酒多是非為衆僧所惡遇病且死同寺有僧靈巋其跡類惟恭為一寺二害因他故出去寺一里逢五六人甚都衣服鮮潔各執樂器如龜茲部問靈巋惟恭上人何在靈巋即語其處所疑寺中有供也及晚回入寺聞鐘聲惟恭已死因說向來所見其日合寺聞絲竹聲竟無樂人入寺當時名僧云惟恭蓋承經之力生不動國亦以其迹勉靈巋也靈巋感悟折節緇門出酉陽雜爼王沔唐元和中嚴司空綬在江陵時岑陽鎮將王沔常持金剛經因使歸州勘事回至咤灘船破五人同溺沔初入水若有人授竹一竿隨波出沒至下牢鎮著岸不死視手中物乃金剛經也咤灘至於下牢鎮三百餘里出酉陽雜爼張御史張某唐天寶中為御史判官奉使淮南推覆將渡淮有黃衫人自後奔走來渡謂有急事特駐舟洎至乃云附載渡淮耳御船者欲歐擊之兼責讓何以欲濟而輒停留判官某云無擊反責所由云載一百姓渡淮亦何苦也親以餘食哺之其人甚愧恧既濟與某分路須臾至前驛已在門所某意是囑請心甚嫌之謂曰吾適渡汝何為復至可即遽去云己實非人欲與判官議事非左右所聞因屏左右云奉命取君合淮中溺死適承一饌固不忘已蒙厚恩只可一日停留耳某求還至舍有所遺囑鬼云一日之外不敢違也我雖為使然在地下職類人間里尹方胥爾某欲前請救鬼云人鬼異路無宜相逼恐不免耳某遙拜鬼云能一日之內轉千卷續命經當得延壽言訖出去至門又回請云識續命經否某初未了知鬼云即人間金剛經也某云今日已晚何由轉得千卷經鬼云但是人轉則可某乃大呼傳舍中及他百姓等數十人同轉至明日晚終千遍訖鬼又至云判官已免會須暫謁地府衆人皆見黃衫吏與某相隨出門既見王具言千遍續命經足得延壽命取檢云與所誦實同因合掌云若爾猶當更得十載壽便放重生至門前所追吏云坐追判官遲回今已遇捶乃袒示之願乞少錢某云我貧士且在逆旅多恐不便鬼云唯二百千某云若是紙錢當奉五百貫鬼云感君厚意但我德素薄何由受汝許錢二百千正可某云今我亦鬼耳夜還逆旅未易辨得鬼云判官但心念令妻子還我自當得之某遂心念甚至鬼云已領訖須臾復至云夫人欲與阿嬭不肯又令某心念阿嬭須臾曰得矣某因冥然如落深坑因此遂活求暇還家具說其事妻云是夢夢君已死求二百千紙錢欲便市造阿嬭故云夢中事何足信其夕阿嬭又夢因得十年後卒也出廣異記費子玉天寶中犍為參軍費子玉官舍夜臥忽見二吏至牀前召費參軍子玉驚起問誰吏云大王召君子玉云身是州吏不屬王國何得見召吏云閻羅子玉大懼呼人鞴馬無應之者倉卒隨吏去至一城城門內外各有數千人子玉持誦金剛經爾時恆心誦之又切念云若遇菩薩當訴以屈須臾王命引入子玉再拜甚歡然俄見一僧從雲中下子玉前致敬子玉復揚言欲見地藏菩薩王曰子玉此是也子玉前禮拜菩薩云何以知我耶因謂王曰此人一生誦金剛經以算未盡宜遣之去王視子玉忽怒問其姓名子玉對云嘉州參軍費子玉王曰此犍為郡何嘉州也汝合死正為菩薩苦論且釋君去子玉再拜辭出菩薩云汝還勿復食肉當得永壽引子玉禮聖容聖容是銅佛頭面手悉動菩薩禮拜手足悉展子玉亦禮禮畢出門子玉問門外人何其多乎菩薩云此輩各罪福不明已數百年為鬼不得託生子玉辭還舍復活後三年食肉又死為人引證菩薩見之大怒云初不令汝食肉何故違約子玉既重生遂斷葷血初子玉纍取三妻皆云被追之亦悉來見子玉問何得來耶妻云君勿顧之耳小妻云君與我不足有恨而來所用己錢何不還之子玉云錢亦易得妻云用我銅錢今還紙錢耶子玉云夫用婦錢義無還理妻無以應遲回各去也出廣異記錢方義殿中侍御史錢方義故華州刺史禮部尚書徽之子寶曆初獨居長樂第夜如廁僮僕從者忽見蓬頭青衣長數尺來逼方義初懼欲走又以鬼神之來走亦何益乃強謂曰君非郭登耶曰然曰與君殊路何必相見常聞人若見君莫不致死豈方義命當死而見耶方義家居華州女兄衣佛者亦在此一旦溘死君手命不敢惜顧人弟之情不足能相容面辭乎蓬頭者復曰登非害人出亦有限人之見者正氣不勝自致夭橫非登殺之然有心曲欲以託人以死久不敢出惟貴人福祿無疆正氣充溢見亦無患故敢出相求耳方義曰何求對曰登久任此職積效當遷但以福薄須人助貴人能為寫金字金剛經一卷一心表白回付與登即登之職遂乃小轉必有後報不敢虗言方義曰諾蓬頭者又曰登以陰氣侵陽貴人雖福力正強不成疾病亦當有少不安宜急服生犀角生玳瑁麝香塞鼻則無苦方義至中堂悶絶欲倒遽服麝香等并塞鼻則無苦父門人王直方者居同里久於江嶺從事飛書求得生犀角又服之良久方定明旦選經工令寫金字金剛經三卷令早畢功功畢飯僧回付郭登後月餘歸同州別墅下馬方憩丈人有姓裴者家寄鄂注別已十年忽自門入徑至方義階下方義遂遽拜之丈人曰有客且出門遂前行方義從之及門失之矣見一紫袍象笏導從緋紫夷數十人俟於門外俯視其貌乃郭登也斂笏前拜曰弊職當遷只消金剛經一卷貴人仁念特致三卷今功德極多超轉數等職任崇重爵位貴豪無非貴人之力雖職已驟遷其厨仍舊頃者當任實如鮑肆之人今既別司復求就食方知前苦殆不可堪貴人量察更為轉金剛經七遍即改厨矣終身銘德何時敢忘方義曰諾因問丈人安在曰賢丈汀夏𥨊疾今夕方困神道求人非其親導不可自己適詣先歸耳又曰廁神每月六日例當出巡此日人逢必致災難人見即死見人即病前者八座抱病六旬蓋因登巡畢將歸瞥見半面耳親戚之中遞宜相戒避之也又曰幽冥吏人薄福者衆無所得食率常受餓必能食推食泛祭一切鬼神此心不忘咸見斯衆暗中陳力必救災厄方義曰晦明路殊偶得相遇每一奉見數日不平意欲所言幸於夢寐轉經之請天曙為期唯唯而去及明因召行敬僧念金剛經四十九遍及明祝付與郭登功畢夢曰本請一七數又六之纍計其切食天厨矣貴人有難當先奉白不爾不來黷泛祭之請記無忘焉出續玄怪録巴南宰巴南宰韋氏常念金剛經唐光化中至泥溪遇一女人著緋衣挈二子偕行同登山嶺行人相駐叫噪見是赤狸大蟲三子母也逡巡與韋分路而去韋終不覺是持經之力也出述異記元初唐元初九江人販薪於市年七十常持金剛經晚歸江北中流風浪大起同涉者俱沒唯初浮於水上即漂南岸群舟泊者悉是大初見初背上光高數尺意其貴人既得活爭以衣服遺之及更召以與飯語漸熟乃知村叟因詰光所自云某讀金剛經五十年矣在背者經也前後厄難無不獲免知是經之力也出報應記宋義倫唐宋義倫麟德中為虢王府典籤暴卒三日方蘇云被追見玉王曰君曾殺狗兔鴿今被論君算合盡然適見君師主云君持金剛經不惟滅罪更合延年我今放君君能不喫酒肉持念尊經否義倫拜謝曰能又見殿內牀上有一僧年可五六十披衲義倫即拜禮僧曰吾是汝師故相救可依王語義倫曰諾王令隨使者往看地獄初入一處見大鑊行列其下燃火鑊中煮人痛苦之聲莫不酸惻更入一處鐵牀甚闊人臥其上燒炙焦黑形容不辨西顧有三人枯黑佇立頗似婦人向義倫叩頭云不得食喫已數百年倫答曰我亦自無何可與汝更入一獄向使者云時熱恐家人見斂遂去西南行數十步後呼云無文書恐門司不放出遂得朱書三行字並不識門司果問看了放出乃蘇出報應記楊復恭弟唐內臣姓楊忘其名復恭之弟也陷秦宗權鹿晏洪劉巨容賊內二十餘年但讀金剛經雖在城中未嘗廢會宗權男為襄陽節度使楊為監軍使楊因人心危懼遂誘麾下將趙德言攻殺宗權男發表舉德言為節度使由是軍府稍定民復舊業矣楊於課誦之切益加精勵嘗就牙門外柳樹下焚香課誦之次歘有金字金剛經一卷自空中飛下楊拜捧而立震駭心目得非信受精虔獲此善報也故陷於賊黨二十年間終能梟巨盜立殊勳克保福祿者蓋佛之冥祐也出報應記董進朝董進朝唐元和中入軍時宿直城東樓上一夕月明忽見四人著黃從東來聚立城下說己姓名狀若追捕因相語曰董進朝常持金剛經以一分功德祝庇冥司我輩蒙惠如何殺之須枉命相待若此人他去我等無所賴矣其一人云董進朝對門有一人同年同姓壽限相埒可以代矣因忽不見進朝驚異之及明聞對門哭聲問其故死者父母云子昨宵暴卒進朝感泣說之因為殯葬供養其母後出家法名慧通住興元寺出報應記康仲戚康仲戚唐元和十一年往海東數歲不歸其母唯一子日久憶念有僧乞食母具語之僧曰但持金剛經兒疾回矣母不識字令寫得經乃鑿屋柱以陷之加漆其上晨暮敬禮一夕雷霆大震拔此柱去月餘兒果還以錦囊盛巨木以至家入拜跪母母問之仲戚曰海中遇風舟破墜水忽有雷震投此木於波上某因就浮之得至岸某命是其所與敢不尊敬母驚曰必吾藏經之柱即破柱得經母子常同誦念出報應記吳可久吳可久越人唐元和十五年居長安奉摩尼教妻王氏亦從之歲餘妻暴亡經三載見夢其夫曰某坐邪見為蛇在皇字陂浮圖下明旦當死願為請僧就彼轉金剛經冀免他苦夢中不信叱之妻怒唾其面驚覺面腫痛不可忍妻復夢於夫之兄曰園中取龍舌草搗傅立愈兄寤走取授其弟尋愈詰旦兄弟同往請僧轉金剛經俄有大蛇從塔中出舉首遍視經終而斃可久歸佛常持此經出報應記僧法正唐江陵開元寺般若院僧法正日持金剛經三七遍長慶初得病卒至冥司見若王者問師生平作何功德答曰常念金剛經乃揖上殿登繡座念經七遍侍衛悉合掌階下考掠論對皆停息而聽念畢遣一吏引還王下階送曰上人更得三十年在人間勿廢讀誦因隨吏行數十里至一大坑吏因臨坑自後推之若隕空焉死已七日惟面不冷荊州僧常靖親見其事出酉陽雜爼沙彌道蔭唐石首縣有沙彌道蔭常念金剛經長慶初因他出夜歸中路忽遇虎吼擲而前沙彌知不免乃閉目坐默念金剛經心期救護虎遂伏草守之及曙村中人來往虎乃去視其蹲處涎流於地出酉陽雜爼何老何老鄂州人常為商專誦金剛經唐長慶中因傭人負貨夜憩於山路忽困寐為傭者頸其首投於㵎中取貨而趨市方鬻見何老來惶駭甚何曰我得誦經之力誓不言於人遂相與為僧出報應記勾龍義勾龍義閬州里人唐長慶中於郪縣傭力自給嘗以邑人有疾往省之見寫金剛經龍義無故毀棄而止絶之歸即喑啞醫不能愈頑嚚無識亦竟不悔僅五六年忽聞鄰人有念是經者惕然自責曰我前謗真經得此啞病今若悔謝終身敬奉却能言否自後每聞念經即倚壁專心而聽之月餘疑如念得數日偶行入寺逢一老僧禮之僧問何事遂指口中啞僧遂以刀割舌下便能語因與念經正如鄰人之聲久而訪僧都不復見壁𦘕須菩提像終身禮拜出報應記趙安趙安成都人唐大和四年常持金剛經日十遍會蠻寇退歸安於道中見軍器輒收置於家為仇者所告吏捕至門涕泣禮經而去為獄吏所掠遂自誣服罪將科斷到節師廳枷杻自解乃詰之安曰某不為盜皆得之巷陌每讀金剛經恐是其力節帥叱之不信及過次忽於安名下書一放字後即云餘並准法竟不知何意也及還洗浴禮經開匣視之其經揉裂折軸若壯夫之拉也妻曰某忽聞匣中有聲如有斫撲乃安被考訊之時無差失也出報應記寧勉寧勉者雲中人年少有勇氣善騎射能以力格猛獸不用兵仗北都守健其勇署為衙將後以兵四千軍於飛狐城時薊門帥驕悍棄天子法反書聞闕下唐文宗皇帝詔北都守攻其南詔未至而薊門兵夜伐飛狐鉦鼓震地飛狐人洶然不自安謂寧勉曰薊兵豪健不可歒今且至矣其勢甚急願空其邑以遁去不然旦暮拔吾城吾不忍父子兄弟盡血賊刃下悔寧可及雖天子神武安能雪吾冤乎幸熟計之勉自度兵少固不能折薊師之鋒將聽邑人語慮得罪於天子欲堅壁自守又慮一邑之人悉屠於賊手憂既甚而䇿未決忽有諜者告曰賊盡潰矣有棄甲在城下願取之勉即登城垣望時月明朗見賊兵馳走顛躓者不可數若有大兵擊其後勉大喜開邑門縱兵逐之生擒數十人得遺甲甚多先是勉好浮圖氏常閲佛書金剛經既敗薊師擒其虜以訊焉虜曰向夕望見城上有巨人數四長二丈餘雄俊可懼怒目呿吻袒裼執劒薊人見之慘然汗栗即走避又安有鬪心乎勉悟巨人乃金剛也益自奇之勉官御史中丞後為清塞副使出宣室志倪勤倪勤梓州人唐大和五年以武略稱因典涪州興教倉素持金剛經倉有廳事面江甚為勝槩乃設佛像而讀經其中六月九日江水大漲惟不至此廳下勤讀誦益勵洎水退周祖數里室屋盡溺唯此廳略不沾漬倉亦無傷人皆禮敬出報應記高涉唐大和七年冬給事中李石為太原行軍司馬孔目高涉因宿使院鼕鼕鼓起時詣鄰房忽遇一人長六尺餘呼曰行軍喚爾涉遂行行稍遲其人自後拓之不覺向北約行數十里至野外漸入一谷底後上一山至頂四望邑屋盡在眼下至一曹司所追者呼云追高涉到其中人多朱緑當按者似崔行信郎中判云付司對復至一處數百人露坐與猪羊雜處領至一人前乃涉妹壻杜則也逆謂涉曰君初得書手時作新人局遣某買羊四口記得否今被相責意甚苦毒涉遽云爾時祇使市肉非羊也則遂無言因見羊人立嚙則逡巡被領他去倐忽又見一處露架方梁梁上釘大鐵環有數百人皆持刀以繩繫人頭牽入環中刳剔之涉懼走出但念金剛經倐忽逢舊相識楊演云李說尚書時杖殺賊李英道為劫賊事已於諸處受生三十年今却訴前事君嘗記得否涉辭已年幼不省又遇舊典假怡先與涉為義兄弟逢涉云弟先念金剛經莫廢忘否向來所見未是極苦處勉樹善業今得還亦經之力因送至家如夢死已經宿向拓處數日青腫出酉陽雜爼張政張政卭州人唐開成三年七月十五日暴亡初見四人來捉行半日至大江甚𤄃度深三尺許細看盡是膿血便小聲念金剛經使者色變入城見胡僧長八尺餘罵使者曰何不依帖亂捉平人盡皆驚拜及領見王僧與對坐曰張政是某本宗弟子被妄領來王曰待略勘問王色怒王判放去見使者四人皆著大枷僧自領政出城不見所渡之水僧曰吾是汝所宗和尚汝識我否我是須菩提乃知是持經之力再三拜禮僧曰弟子合眼僧以杖一擊不覺失聲乃活死已三日唯心上暖出報應記皇甫恂皇甫恂字君和開元中授華州參軍暴亡其魂神若在長衢路中交道多槐樹見數吏擁篲恂問之答曰五道將軍常於此息馬恂方悟死耳嗟歎而行忽有黃衣吏數人執符言天曹追遂驅迫至一處門闕甚崇似上東門又有一門似尚書省門門衛極衆方引入一吏曰公有官須別通且伺務隙耳恂拱立候之須臾見街中人驚矍辟易俄見東來數百騎戈矛前驅恂匿身牆門以窺漸近見一老姥擁大蓋䇿四馬從騎甚衆恂細見之乃其親叔母薛氏也恂遂趨出拜伏自言姓名姥駐馬問恂是何人都不省記恂即稱小名姥乃喜曰汝安得來此恂以實對姥曰子姪中惟爾福最隆來當誤耳且吾近充職務苦驅馳汝就府相見也言畢遂過逡巡判官務隙命入見一衣冠昂然與之承迎恂哀祈之謂恂曰足下陽中有功德否恂對曰有之俯而笑曰此非妄語之所顧左右曰喚閹古瓦反割家來恂甚惶懼忽聞疾報聲王有使者來判官遽趨出拜受命恂窺之見一閹人傳命畢方去判官拜送門外却入謂恂向來大使有命言足下未合來所司誤耳足下自見大使便可歸也數吏引去西行三四里至一府郡旌旗擁門恂被命入仰視乃見叔母據大殿命上令坐恂俯伏而坐羽衛森然旁有一僧趺寶座二童子侍側恂亦理揖叔母方敘平生委曲親族誨恂以仁義之道陳報應之事乃曰兒豈不聞地獄乎此則其所也須一觀之叔母顧白僧願導引此兒僧遂整衣而命恂從我恂隨後行北一二里遙望黑風自上屬下烟漲不見其際中有黑城飛焰赫然漸近其城其黑氣即自去和尚丈餘而開至城門即自啓其始入也見左右罪人初剝皮吮血砍刺糜碎其叫呼怨痛宛轉其間莫究其數楚毒之聲動地恂震怖不安求還又北望一門熾然炎火和尚指曰此無間門也言訖欲歸忽聞火中一人呼恂恂視之見一僧坐鐵牀頭上有鐵釘釘其腦流血至地細視之是恂門徒僧胡辨也驚問之僧曰生平與人及公飲酒食肉今日之事自悔何階君今隨和尚必當多福幸垂救曰何以奉救僧曰寫金光明經一部及於都市為造石幢某方得作畜生耳恂悲而諾之遂回至殿具言悉見叔母曰努力為善自不至是又曰兒要知官爵否恂曰願知之俄有黃衣抱案來敕于廡下發視之見京官至多又一節言大府卿貶綿州刺史其後掩之吏曰不合知矣遂令二人送恂歸再拜而出出門後問二吏姓氏一姓焦一姓王相與西行十餘里有一羊三足截路吼瞰罵恂曰我待爾久矣何為割我一腳恂實不省且問之羊曰君某年日向某縣縣尉廳上誇能割羊腳其時無羊少府打屠伯屠伯活割我一腳將去我自此而斃吾由爾而夭恂方省之乃卑詞以謝託以屠者自明焦王二吏亦同解紛羊當路立恂不得去乃謝曰與爾造功德可乎羊曰速為我寫金剛經許之羊遂喜而去二吏又曰幸得奉送亦須得同幸惠各乞一卷竝許之更行里餘二吏曰某只合送至此郎君自尋此徑更一二里有一賣漿店店旁斜路百步已下則到家矣遂別去恂獨行苦困渴果至一店店有水甕不見人恂竊取漿飲忽有一老翁大叫怒持刀以趂罵云盜飲我漿恂大懼却走翁甚疾來恂反顧忽陷坑中恍然遂活而殮棺中死已五六日既而妻覺有變發視之綿綿有氣久而能言令急寫三卷金剛經其夜忽聞敲門聲時有風歘歘然空中朗言曰焦某王某蒙君功德今得生天矣舉家聞之更月餘胡辨師自京來恂異之而不復與飲其僧甚恨恂於靜處略為說冥中見師如此師輒不為之信既而去至信州忽患頂瘡宿昔潰爛困篤僧曰恂言其神乎數日而卒恂因為市中造石幢幢工始畢其日市中豕生六子五色白自詣幢環繞數日疲困而卒今幢見存焉恂後果為大府卿貶綿州刺史而卒出通幽記蔡州行者唐宋汶牧黃州日秦宗權阻命作亂將欲大掠四境蔡州有念金剛經行者郡人咸敬之宗權差為細作令入黃州探事行者至黃州未逾旬為人告敗宋汶大怒令於軍門集衆決殺忽報有加官使到將校等上言方聞喜慶不欲遽行殺戮由是但令禁錮逾月使臣不到又命行刑出陛牢次報使入境復且停止使已發引出就刑值大將入衙見之遽白於宋曰黃州士馬精強城壘嚴峻何懼姦賊窺覘細作本非惡黨受制於人將軍曲貸性命足示寬恕汶然之命髠髮負鉗緣化財物造開元新寺寺宇將就之一夜夢八金剛告曰負鉗僧苦行如此締構既終盍釋其鉗以旌善類汶覺大異之遂令釋鉗待以殊體自後一州悉呼為金剛和尚出報應記販海客唐有一富商恆誦金剛經每以經卷自隨嘗賈販外國夕宿於海島衆商利其財共殺之盛以大籠加巨石并經沉於海平明衆商船發而夜來所治之島乃是僧院其院僧每夕則聞人念金剛經聲深在海底僧大異之因命善泅者沉於水訪之見一老人在籠中讀經乃牽挽而上僧問其故云被殺沉於海不知是籠中忽覺身處宮殿常有人送飲食安樂自在也衆僧聞之悉普加讚歎蓋金剛經之靈驗遂投僧削髮出家於島院出報應記曹州濟陰縣精舍唐曹州濟陰縣西二十里村中有精舍至龍朔二年冬十月野火暴起非常熾盛及至精舍踰越而過焉比僧房草舍焚燎總盡唯金剛般若經一卷儼然如舊曹州參軍說之出冥報拾遺李思一唐隴西李思一今居相州之陽縣貞觀二十年正月已死經日而蘇語在冥報記至永徽三年五月又死經一宿而蘇說云以年命未盡蒙王放復歸於王前見相州陽縣法觀寺僧辨圭又見會福寺僧弘亮及慧寶三人並在王前辨答見冥官云慧寶死期未至宜修功德辨圭弘亮今歲必死辨圭等是年果相繼卒後寺僧令一巫者就弘亮等舊房召二僧問之辨圭曰我為破齊今受大苦兼語諸弟子等曰為我作齊救苦難弟子輩即為營齊巫者又云辨圭已得免罪弘亮云我為破齊兼妄持人長短念被拔舌痛苦不能多言相州智力寺僧慧永等說之出冥報拾遺李觀唐隴西李觀顯慶中寓止滎陽丁父憂乃刺血寫金剛般若心經隨願往生經各一卷自後院中恆有異香非常馥烈鄰側亦常聞之無不稱歎中山即徐令過鄭州見彼親友具陳其事出太平廣記陳文達唐陳文達梓州郪縣人常持金剛經願與亡父母念八萬四千卷多有祥瑞為人轉經患難皆免銅山縣人陳約曾為冥司所追見地下築臺問之云此是般若臺待陳文達其為冥司所敬如此出太平廣記高紙高紙隋僕射潁之孫也唐龍朔二年出長安順義門忽逢二人乘馬曰王喚紙不肯從去亦不知其鬼使䇿馬避之又被驅擁紙有兄是化度寺僧欲住寺內至寺門鬼遮不令入紙乃毆鬼一拳鬼怒即拽落馬曰此漢大凶粗身遂在地因便昏絶寺僧即令舁入兄院明旦乃蘇云初隨二使見王王曰汝未合來汝曾毀謗佛法且令生受其罪令左右拔其舌以犁耕之都無所傷王問水吏曰彼有何福德如此曰曾念金剛經王稱善即令放還因與客語言次忽悶倒如吞物狀咽下有白脉一道流入腹中如此三度人問之曰少年盜食寺家果子冥司罰令吞鐵丸後仕為翊衛專以念經為事出報應記竇德玄竇德玄麟德中為卿奉使楊州渡淮船已離岸數十步見岸上有一人形容憔悴擎一小襆坐於地德玄曰日將暮更無船渡即令載之中流覺其有飢色又與飯乃濟及德玄上馬去其人即隨行已數里德玄怪之乃問曰今欲何去答曰某非人乃鬼使也今往楊州追竇大使曰大使何名云名德玄德玄驚懼下馬拜曰某即其人也涕泗請計鬼曰甚愧公容載復又賜食且放公急念金剛經一千遍當來相報至月餘經數足其鬼果來云經已足保無他慮然亦終須相隨見王德玄於是就枕而絶一宿乃蘇云初隨使者入一宮城使者曰公且住我當先白王使者乃入於屏障後聞王遙語曰儞與他作計漏泄吾事遂受杖三十使者却出袒以示公曰喫杖了也德玄再三愧謝遂引入見一著紫衣人下階相揖云公大有功德尚未合來請公還出墮坑中於是得活其使者續至云飢未食及乞錢財並與之問其將來官爵曰熟記取從此改殿中監次大司憲次太子中允次司元太常伯次左相年至六十四言訖辭去曰更不復得來矣後皆如其言出報應記
